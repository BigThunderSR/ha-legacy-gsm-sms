name: Rebase Dependabot PRs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase all open Dependabot PRs
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const dependabotPRs = pulls.filter(
              (pr) => pr.user.login === 'dependabot[bot]'
            );

            core.info(`Found ${dependabotPRs.length} open Dependabot PRs`);

            for (const pr of dependabotPRs) {
              core.info(`Updating branch for PR #${pr.number}: ${pr.title}`);
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                core.info(`Successfully updated PR #${pr.number}`);
              } catch (error) {
                core.warning(`Failed to update PR #${pr.number}: ${error.message}`);
              }
            }
