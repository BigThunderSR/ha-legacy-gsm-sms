[flake8]
exclude = .venv*,.git,.tox,docs,venv,bin,lib,deps,build,temp-pavelve,z-addon-old-test
max-line-length = 120
# E203: whitespace before ':' (conflicts with black)
# W291, W292, W293: trailing/blank-line whitespace (handled by black)
# E402: module-level import not at top (intentional conditional imports)
# E501: line too long (black handles what it can, rest is acceptable)
# E711: comparison to None (minor, existing code)
# E722: bare except (intentional for hardware fault tolerance)
# F401: unused imports (noisy, no runtime impact)
# F541: f-string without placeholders (cosmetic)
# F811: redefined unused import (intentional local re-imports in functions)
# F824: unused global declaration (cache pattern, set up for use)
# F841: unused variable (noisy, no runtime impact)
extend-ignore = E203, W291, W292, W293, E402, E501, E711, E722, F401, F541, F811, F824, F841

[isort]
profile = black
force_sort_within_sections = true
known_first_party = custom_components.legacy_gsm_sms
combine_as_imports = true

[tool:pytest]
testpaths = tests
norecursedirs = .git
asyncio_mode = auto
